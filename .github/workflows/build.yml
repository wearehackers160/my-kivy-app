name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          python3-pip \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          build-essential

        pip install --upgrade pip
        pip install buildozer cython

    - name: PRE-FIX Android SDK environment
      run: |
        mkdir -p $HOME/.android
        touch $HOME/.android/repositories.cfg

    - name: Force accept Android licenses (CRITICAL FIX)
      run: |
        yes | buildozer android update || true
        yes | buildozer android debug || true

    - name: Build APK (final build)
      run: |
        buildozer -v android debug

    - name: Find APK
      run: |
        find . -name "*.apk"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: "**/*.apk"

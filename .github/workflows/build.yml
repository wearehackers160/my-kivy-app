name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # =========================
    # SYSTEM DEPENDENCIES
    # =========================
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip \
          openjdk-17-jdk \
          python3-pip \
          build-essential \
          autoconf automake libtool \
          pkg-config

        pip install --upgrade pip
        pip install cython==0.29.36 buildozer==1.5.0

    # =========================
    # FORCE ANDROID LICENSE ACCEPT
    # =========================
    - name: Install Android SDK tools
      run: |
        mkdir -p $HOME/.android
        touch $HOME/.android/repositories.cfg

        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk/cmdline-tools

        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        rm commandlinetools-linux-11076708_latest.zip

        mv cmdline-tools latest || true

        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

    # =========================
    # ACCEPT LICENSES (IMPORTANT FIX)
    # =========================
    - name: Accept Android licenses + install build-tools
      run: |
        yes | sdkmanager --licenses || true

        sdkmanager \
          "platform-tools" \
          "platforms;android-33" \
          "build-tools;33.0.2"

    # =========================
    # BUILD FOLDER FIX
    # =========================
    - name: Prepare Buildozer environment
      run: |
        mkdir -p ~/.buildozer
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg

    # =========================
    # CACHE
    # =========================
    - name: Cache build
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.gradle
        key: build-${{ runner.os }}

    # =========================
    # BUILD APK
    # =========================
    - name: Build APK
      run: |
        buildozer -v android debug

    # =========================
    # FIND APK
    # =========================
    - name: Find APK
      run: find . -name "*.apk"

    # =========================
    # UPLOAD APK
    # =========================
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: "**/*.apk"

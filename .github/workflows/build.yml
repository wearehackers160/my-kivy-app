name: Build Kivy APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # =========================
      # PYTHON
      # =========================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # =========================
      # JAVA 17 (REQUIRED)
      # =========================
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # =========================
      # SYSTEM DEPENDENCIES
      # =========================
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip wget \
            build-essential autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libffi-dev libssl-dev

      # =========================
      # PYTHON PACKAGES
      # =========================
      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      # =========================
      # CLEAN BUILD (NO SDKMANAGER!)
      # =========================
      - name: Build APK
        run: |
          buildozer android debug

      # =========================
      # UPLOAD APK
      # =========================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk

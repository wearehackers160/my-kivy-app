name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip git zip unzip openjdk-17-jdk build-essential

        pip install --upgrade pip
        pip install buildozer cython

    - name: Pre-accept Android licenses (IMPORTANT FIX)
      run: |
        mkdir -p $HOME/.android
        touch $HOME/.android/repositories.cfg || true

    - name: Build APK (Buildozer handles SDK install)
      run: |
        yes | buildozer android debug || true

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk

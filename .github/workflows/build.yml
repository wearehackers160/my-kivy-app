name: Build Kivy Android APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    # =========================
    # CHECKOUT
    # =========================
    - name: Checkout code
      uses: actions/checkout@v4

    # =========================
    # JAVA 17 (REQUIRED)
    # =========================
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # =========================
    # PYTHON (FIX VERSION)
    # =========================
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # =========================
    # INSTALL SYSTEM DEPENDENCIES
    # =========================
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip \
        autoconf libtool pkg-config zlib1g-dev \
        libncurses5-dev libncursesw5-dev libtinfo5 \
        cmake libffi-dev libssl-dev build-essential

    # =========================
    # INSTALL PYTHON TOOLS
    # =========================
    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    # =========================
    # ANDROID SDK SETUP (FIXED)
    # =========================
    - name: Setup Android SDK
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk

        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip commandlinetools-linux-*.zip

        # FIX FOLDER STRUCTURE
        mv cmdline-tools cmdline-tools-temp
        mkdir -p cmdline-tools/latest
        mv cmdline-tools-temp/* cmdline-tools/latest/
        rm -rf cmdline-tools-temp

        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
        echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

        # ACCEPT LICENSES
        yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true

        # INSTALL REQUIRED SDK PARTS
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager \
          "platform-tools" \
          "platforms;android-33" \
          "build-tools;33.0.2"

    # =========================
    # CLEAR CACHE (IMPORTANT)
    # =========================
    - name: Clear buildozer cache
      run: rm -rf ~/.buildozer

    # =========================
    # BUILD APK
    # =========================
    - name: Build APK
      run: |
        buildozer -v android debug

    # =========================
    # UPLOAD APK
    # =========================
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: kivy-apk
        path: bin/*.apk

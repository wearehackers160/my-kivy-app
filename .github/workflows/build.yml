name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # =========================
    # 1. GET CODE
    # =========================
    - name: Checkout repository
      uses: actions/checkout@v4

    # =========================
    # 2. INSTALL ALL SYSTEM DEPENDENCIES
    # =========================
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip \
          openjdk-17-jdk \
          python3-pip \
          python3-dev \
          build-essential \
          autoconf \
          automake \
          libtool \
          libtool-bin \
          pkg-config \
          cmake \
          libffi-dev \
          libssl-dev \
          zlib1g-dev \
          m4

        pip install --upgrade pip setuptools wheel
        pip install cython buildozer

    # =========================
    # 3. SETUP ANDROID ENVIRONMENT
    # =========================
    - name: Setup Android environment
      run: |
        mkdir -p $HOME/.android
        touch $HOME/.android/repositories.cfg

    # =========================
    # 4. INITIALIZE AUTOTOOLS (CRITICAL FIX)
    # =========================
    - name: Initialize autotools and set paths
      run: |
        export ACLOCAL_PATH="/usr/share/aclocal:$ACLOCAL_PATH"
        export LD_LIBRARY_PATH="/usr/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH"
        
        # Verify tools are installed
        which autoconf automake libtoolize aclocal m4
        autoconf --version | head -n 1
        automake --version | head -n 1
        libtoolize --version | head -n 1
        
        # Pre-generate m4 cache to avoid issues
        aclocal --version

    # =========================
    # 5. FORCE CLEAN BUILD CACHE
    # =========================
    - name: Clean Buildozer cache
      run: |
        rm -rf .buildozer .buildozer/ || true
        rm -rf ~/.buildozer || true

    # =========================
    # 6. PRE-SETUP SDK AND TOOLS
    # =========================
    - name: Pre-setup Android SDK
      continue-on-error: true
      run: |
        yes | buildozer android update || true

    # =========================
    # 7. BUILD APK WITH PROPER ENVIRONMENT
    # =========================
    - name: Build APK
      run: |
        export ACLOCAL_PATH="/usr/share/aclocal:$ACLOCAL_PATH"
        export LDFLAGS="-L/usr/lib/x86_64-linux-gnu"
        export CPPFLAGS="-I/usr/include"
        export LD_LIBRARY_PATH="/usr/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH"
        
        buildozer -v android debug

    # =========================
    # 8. FIND AND VERIFY APK
    # =========================
    - name: Locate APK
      run: |
        find . -name "*.apk" -type f
        ls -lah bin/ || true

    # =========================
    # 9. UPLOAD APK AS ARTIFACT
    # =========================
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
        retention-days: 30

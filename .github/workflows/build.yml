name: Build Kivy Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    # =========================
    # CHECKOUT
    # =========================
    - name: Checkout repo
      uses: actions/checkout@v4

    # =========================
    # PYTHON
    # =========================
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # =========================
    # JAVA
    # =========================
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "17"

    # =========================
    # SYSTEM PACKAGES
    # =========================
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk \
        python3-pip autoconf libtool pkg-config zlib1g-dev \
        libncurses5-dev libncursesw5-dev libtinfo5 cmake \
        libffi-dev libssl-dev wget

    # =========================
    # INSTALL BUILDOZER
    # =========================
    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    # =========================
    # ANDROID SDK (FIXED STRUCTURE)
    # =========================
    - name: Setup Android SDK
      run: |
        mkdir -p $HOME/android-sdk

        cd $HOME/android-sdk
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O sdk.zip
        unzip sdk.zip
        rm sdk.zip

        # FIX STRUCTURE FOR BUILDOZER (IMPORTANT)
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/* cmdline-tools/latest/ || true

        # CRITICAL: create OLD PATH for buildozer
        mkdir -p tools/bin
        ln -sf $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager tools/bin/sdkmanager

        export ANDROID_HOME=$HOME/android-sdk
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH

        yes | sdkmanager --licenses

        sdkmanager "platform-tools" \
                   "platforms;android-33" \
                   "build-tools;33.0.2"

    # =========================
    # LINK SDK FOR BUILDOZER
    # =========================
    - name: Link SDK
      run: |
        mkdir -p ~/.buildozer/android/platform
        ln -sf $HOME/android-sdk ~/.buildozer/android/platform/android-sdk

    # =========================
    # CLEAN CACHE
    # =========================
    - name: Clean buildozer
      run: rm -rf .buildozer

    # =========================
    # BUILD APK
    # =========================
    - name: Build APK
      run: buildozer android debug

    # =========================
    # UPLOAD APK
    # =========================
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk

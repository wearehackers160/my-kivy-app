name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # =========================
    # 1. GET CODE
    # =========================
    - name: Checkout code
      uses: actions/checkout@v4

    # =========================
    # 2. SYSTEM DEPENDENCIES
    # =========================
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip \
          openjdk-17-jdk \
          python3-pip \
          build-essential \
          autoconf \
          libtool \
          pkg-config

        python3 -m pip install --upgrade pip
        pip install buildozer cython

    # =========================
    # 3. ANDROID SDK PREP FIX
    # =========================
    - name: Prepare Android environment
      run: |
        mkdir -p $HOME/.android
        touch $HOME/.android/repositories.cfg

    # =========================
    # 4. FORCE BUILD FIRST (Buildozer handles SDK)
    # =========================
    - name: Build APK (first attempt - triggers SDK install)
      continue-on-error: true
      run: |
        yes | buildozer android update

    # =========================
    # 5. FORCE LICENSE ACCEPT + FIX AIDL
    # =========================
    - name: Fix Android SDK licenses
      run: |
        SDK=$HOME/.buildozer/android/platform/android-sdk

        # wait until sdk exists
        ls -R $SDK || true

        # accept licenses if sdkmanager exists
        if [ -f "$SDK/cmdline-tools/latest/bin/sdkmanager" ]; then
          yes | $SDK/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $SDK/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "build-tools;33.0.2" \
            "platforms;android-33" || true
        fi

    # =========================
    # 6. FINAL BUILD (REAL)
    # =========================
    - name: Build APK (final)
      run: |
        buildozer -v android debug

    # =========================
    # 7. FIND APK
    # =========================
    - name: Locate APK
      run: |
        find . -name "*.apk" || true

    # =========================
    # 8. UPLOAD APK
    # =========================
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: "**/*.apk"
        

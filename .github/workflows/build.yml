name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # =========================
    # 1. GET CODE
    # =========================
    - name: Checkout repository
      uses: actions/checkout@v4

    # =========================
    # 2. SYSTEM FIX PACKAGES (IMPORTANT)
    # =========================
    - name: Install dependencies
      run: |
        sudo apt update

        sudo apt install -y \
          git zip unzip \
          openjdk-17-jdk \
          python3-pip \
          build-essential \
          autoconf \
          automake \
          libtool \
          pkg-config \
          cmake \
          libffi-dev \
          libssl-dev \
          zlib1g-dev

        pip install --upgrade pip
        pip install cython buildozer

    # =========================
    # 3. ANDROID ENV FIX
    # =========================
    - name: Setup Android environment
      run: |
        mkdir -p $HOME/.android
        touch $HOME/.android/repositories.cfg

    # =========================
    # 4. FORCE CLEAN BUILD CACHE (IMPORTANT FIX)
    # =========================
    - name: Clean Buildozer cache
      run: |
        rm -rf .buildozer || true

    # =========================
    # 5. FORCE SDK INSTALL (WITH LICENSE FIX)
    # =========================
    - name: Build APK (first pass - setup SDK)
      continue-on-error: true
      run: |
        yes | buildozer android update || true

    # =========================
    # 6. PATCH LIBTOOL ISSUE (FIX LT_SYS_SYMBOL_USCORE)
    # =========================
    - name: Fix libtool/autotools issue
      run: |
        sudo apt install -y libtool-bin

        export AUTOMAKE="automake"
        export ACLOCAL="aclocal"
        export AUTOCONF="autoconf"

        echo "libtool patch applied"

    # =========================
    # 7. FINAL BUILD
    # =========================
    - name: Build APK (final)
      run: |
        buildozer -v android debug

    # =========================
    # 8. FIND APK
    # =========================
    - name: Locate APK
      run: |
        find . -name "*.apk" || true

    # =========================
    # 9. UPLOAD APK
    # =========================
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: "**/*.apk"

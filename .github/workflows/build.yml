name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # =========================
    # 1. GET CODE
    # =========================
    - name: Checkout repository
      uses: actions/checkout@v4

    # =========================
    # 2. SYSTEM DEPENDENCIES
    # =========================
    - name: Install system packages
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip \
          openjdk-17-jdk \
          python3-pip \
          build-essential \
          autoconf \
          libtool \
          pkg-config

        pip install --upgrade pip
        pip install buildozer cython virtualenv

    # =========================
    # 3. ANDROID LICENSE FIX (CRITICAL)
    # =========================
    - name: Fix Android SDK licenses
      run: |
        mkdir -p $HOME/.android
        touch $HOME/.android/repositories.cfg

        # force accept all licenses
        yes | sdkmanager --licenses || true

    # =========================
    # 4. CLEAN BUILD ENV
    # =========================
    - name: Clean build cache
      run: |
        rm -rf .buildozer

    # =========================
    # 5. FORCE BUILD
    # =========================
    - name: Build APK
      run: |
        buildozer -v android debug

    # =========================
    # 6. FIND APK
    # =========================
    - name: Locate APK
      run: |
        find . -name "*.apk"

    # =========================
    # 7. UPLOAD APK
    # =========================
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: "**/*.apk"

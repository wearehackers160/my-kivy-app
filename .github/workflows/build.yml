name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # =========================
    # 1. GET CODE
    # =========================
    - name: Checkout repository
      uses: actions/checkout@v4

    # =========================
    # 2. SYSTEM FIX (IMPORTANT)
    # =========================
    - name: Install ALL dependencies (FIX AUTOCONF ERROR)
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip \
          openjdk-17-jdk \
          python3-pip \
          build-essential \
          autoconf \
          automake \
          libtool \
          pkg-config \
          m4 \
          cmake \
          libffi-dev

        pip install --upgrade pip
        pip install cython buildozer

    # =========================
    # 3. CLEAN ANDROID SETUP
    # =========================
    - name: Android environment setup
      run: |
        mkdir -p $HOME/.android
        touch $HOME/.android/repositories.cfg

    # =========================
    # 4. FORCE SDK FIX
    # =========================
    - name: Pre-build SDK install (fix AIDL + build-tools)
      run: |
        yes | buildozer android update || true

    # =========================
    # 5. FORCE CLEAN BUILD (IMPORTANT FIX)
    # =========================
    - name: Clean build
      run: |
        buildozer android clean || true

    # =========================
    # 6. FINAL BUILD
    # =========================
    - name: Build APK
      run: |
        buildozer -v android debug

    # =========================
    # 7. FIND APK
    # =========================
    - name: Find APK
      run: |
        find . -name "*.apk" || true

    # =========================
    # 8. UPLOAD APK
    # =========================
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: "**/*.apk"

name: Build Kivy Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    # =========================
    # PYTHON
    # =========================
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # =========================
    # JAVA (IMPORTANT)
    # =========================
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # =========================
    # INSTALL DEPENDENCIES
    # =========================
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y zip unzip openjdk-17-jdk \
        python3-pip autoconf libtool pkg-config zlib1g-dev \
        libncurses5-dev libncursesw5-dev libtinfo5 cmake \
        libffi-dev libssl-dev git wget

    # =========================
    # INSTALL BUILDOZER
    # =========================
    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    # =========================
    # SETUP ANDROID SDK
    # =========================
    - name: Setup Android SDK
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk/cmdline-tools

        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
        unzip tools.zip
        rm tools.zip

        mv cmdline-tools latest

        export ANDROID_HOME=$HOME/android-sdk
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH

        yes | sdkmanager --licenses

        sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

    # =========================
    # LINK SDK (CRITICAL FIX)
    # =========================
    - name: Link SDK for Buildozer
      run: |
        mkdir -p ~/.buildozer/android/platform
        ln -sf $HOME/android-sdk ~/.buildozer/android/platform/android-sdk

    # ❌ DO NOT DELETE SDK AFTER LINKING

    # =========================
    # BUILD APK
    # =========================
    - name: Build APK
      run: |
        buildozer android debug

    # =========================
    # UPLOAD APK
    # =========================
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk

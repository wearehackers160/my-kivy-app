name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # =========================
    # SYSTEM DEPENDENCIES (FIXED)
    # =========================
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip \
          openjdk-17-jdk \
          python3-pip \
          build-essential \
          autoconf \
          automake \
          libtool \
          pkg-config \
          cmake \
          libffi-dev \
          libssl-dev

        python3 -m pip install --upgrade pip
        pip install cython==0.29.36
        pip install buildozer==1.5.0

    # =========================
    # FIX ANDROID ENV (NO MANUAL SDK)
    # =========================
    - name: Setup Buildozer folders
      run: |
        mkdir -p $HOME/.android
        touch $HOME/.android/repositories.cfg
        mkdir -p $HOME/.buildozer

    # =========================
    # CACHE (SPEED + STABILITY)
    # =========================
    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.gradle
        key: buildozer-${{ runner.os }}

    # =========================
    # BUILD APK
    # =========================
    - name: Build APK
      run: |
        buildozer -v android debug

    # =========================
    # FIND APK
    # =========================
    - name: Find APK
      run: find . -name "*.apk"

    # =========================
    # UPLOAD APK
    # =========================
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: "**/*.apk"

name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # =========================
    # 1. GET CODE
    # =========================
    - name: Checkout code
      uses: actions/checkout@v4

    # =========================
    # 2. SYSTEM DEPENDENCIES
    # =========================
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          python3-pip \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          build-essential \
          autoconf \
          libtool \
          pkg-config

        python3 -m pip install --upgrade pip
        pip install buildozer cython virtualenv

    # =========================
    # 3. FIX ANDROID ENV (SAFE ONLY)
    # =========================
    - name: Android environment fix
      run: |
        mkdir -p $HOME/.android
        touch $HOME/.android/repositories.cfg

    # =========================
    # 4. CLEAN OLD BUILD CACHE (IMPORTANT)
    # =========================
    - name: Clean Buildozer cache
      run: |
        rm -rf .buildozer

    # =========================
    # 5. BUILD APK
    # =========================
    - name: Build APK
      run: |
        buildozer -v android debug

    # =========================
    # 6. FIND APK
    # =========================
    - name: Find APK
      run: |
        find . -name "*.apk"

    # =========================
    # 7. UPLOAD APK
    # =========================
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: "**/*.apk"

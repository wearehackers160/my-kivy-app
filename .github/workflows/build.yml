name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # =========================
    # GET CODE
    # =========================
    - name: Checkout repo
      uses: actions/checkout@v4

    # =========================
    # SYSTEM PACKAGES (FIX ALL NATIVE ERRORS)
    # =========================
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip \
          openjdk-17-jdk \
          python3-pip \
          build-essential \
          autoconf \
          automake \
          libtool \
          pkg-config \
          m4 \
          cmake \
          libffi-dev \
          libssl-dev

        pip install --upgrade pip
        pip install cython buildozer virtualenv

    # =========================
    # CLEAN BUILD FOLDER (VERY IMPORTANT)
    # =========================
    - name: Clean Buildozer cache
      run: |
        rm -rf .buildozer || true
        mkdir -p $HOME/.android
        touch $HOME/.android/repositories.cfg

    # =========================
    # FORCE FIRST BUILD (LET IT INSTALL SDK PROPERLY)
    # =========================
    - name: First Build (SDK setup)
      run: |
        yes | buildozer android update || true

    # =========================
    # FINAL BUILD (REAL APK)
    # =========================
    - name: Build APK
      run: |
        buildozer -v android debug

    # =========================
    # FIND APK
    # =========================
    - name: Find APK
      run: |
        find . -name "*.apk"

    # =========================
    # UPLOAD APK
    # =========================
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: "**/*.apk"

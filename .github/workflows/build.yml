name: Build Kivy APK (Stable Fix)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    # =========================
    # CLEAN START
    # =========================
    - name: Checkout repo
      uses: actions/checkout@v4

    # =========================
    # PYTHON
    # =========================
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # =========================
    # JAVA
    # =========================
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "17"

    # =========================
    # SYSTEM PACKAGES
    # =========================
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk \
        python3-pip autoconf libtool pkg-config zlib1g-dev \
        libncurses5-dev libncursesw5-dev libtinfo5 cmake \
        libffi-dev libssl-dev wget

    # =========================
    # CLEAN EVERYTHING (IMPORTANT)
    # =========================
    - name: Clean environment
      run: |
        rm -rf ~/.buildozer
        rm -rf ~/.android

    # =========================
    # INSTALL BUILDOZER
    # =========================
    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    # =========================
    # BUILD (LET BUILDOZER HANDLE ANDROID ITSELF)
    # =========================
    - name: Build APK
      run: |
        buildozer android debug

    # =========================
    # UPLOAD APK
    # =========================
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk

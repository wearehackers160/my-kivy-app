name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system dependencies (FIXED)
      run: |
        sudo apt update
        sudo apt install -y \
          python3-pip \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          build-essential \
          autoconf \
          automake \
          libtool \
          libtool-bin \
          m4 \
          pkg-config \
          cmake

    - name: Upgrade pip + install buildozer
      run: |
        python3 -m pip install --upgrade pip
        pip install cython==0.29.36 buildozer

    - name: PRE-FIX Android SDK environment
      run: |
        mkdir -p $HOME/.android
        touch $HOME/.android/repositories.cfg

    - name: Cache Buildozer (IMPORTANT)
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.local/share/python-for-android
        key: buildozer-${{ runner.os }}

    - name: Build APK
      run: |
        buildozer -v android debug

    - name: Find APK
      run: find . -name "*.apk"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: "**/*.apk"

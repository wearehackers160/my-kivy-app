name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # FIX 1: correct Python version
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Java required for Android build
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Install dependencies
      - name: Install system packages
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip

      - name: Install Python tools
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      # Android SDK setup
      - name: Install Android SDK Command Line Tools
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
          unzip tools.zip

          # FIX 2: correct folder structure (IMPORTANT)
          mv cmdline-tools cmdline-tools-temp
          mkdir -p cmdline-tools/latest
          mv cmdline-tools-temp/* cmdline-tools/latest/

          rm tools.zip

          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      # FIX 3: accept ALL licenses automatically
      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses

      # FIX 4: install stable build-tools (NOT 37)
      - name: Install Android packages
        run: |
          sdkmanager "platform-tools" \
                     "platforms;android-34" \
                     "build-tools;34.0.0"

      # Build APK
      - name: Build APK
        run: |
          buildozer android debug

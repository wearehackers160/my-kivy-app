name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system packages
      run: |
        sudo apt update
        sudo apt install -y \
          python3-pip \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          build-essential

        pip install --upgrade pip
        pip install buildozer cython

    - name: Force Android SDK license acceptance (CRITICAL FIX)
      run: |
        yes | sdkmanager --licenses || true

    - name: Build APK
      run: |
        buildozer -v android debug

    - name: Find APK (debug check)
      run: |
        find . -name "*.apk"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: "**/*.apk"
